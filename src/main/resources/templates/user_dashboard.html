<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LegalAI Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: white;
            color: #333;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            color: white;
            padding: 30px 20px;
        }

        .sidebar h2 {
            font-weight: 600;
            margin-bottom: 40px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ddd;
            margin: 15px 0;
            text-decoration: none;
            padding: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        /* HEADER */
        .header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        /* CARDS */
        .glass-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* BUTTON */
        .btn-premium {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            border-radius: 30px;
            padding: 10px 25px;
        }

        .btn-premium:hover {
            opacity: 0.9;
        }

        /* TABLE */
        .table {
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead {
            background: #667eea;
            color: white;
        }

        /* FILE INPUT */
        .form-control {
            border-radius: 10px;
        }

    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- 🔥 SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h2>⚖ LegalAI</h2>

            <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="#"><i class="bi bi-file-earmark-text"></i> Documents</a>
            <a href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
        </div>

        <!-- 🔥 MAIN CONTENT -->
        <div class="col-md-10 p-4">

            <!-- HEADER -->
            <div class="header d-flex justify-content-between align-items-center">
                <h4>Welcome, <span th:text="${session.user.name}"></span> 👋</h4>
                <span class="badge bg-primary">AI Powered</span>
            </div>

            <!-- UPLOAD CARD -->
            <div class="glass-card mb-4">
                <h5 class="mb-3">📤 Upload Legal Document</h5>

                <form action="/upload" method="post" enctype="multipart/form-data">
                    <input type="file" name="file" class="form-control mb-3" required/>
                    <button class="btn btn-premium">
                        <i class="bi bi-magic"></i> Simplify
                    </button>
                </form>
            </div>

            <!-- DOCUMENT HISTORY 
            <div class="glass-card">
                <h5 class="mb-3">📑 Document History</h5>

                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Original</th>
                            <th>Simplified</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="doc : ${documents}">
                            <td th:text="${doc.id}"></td>

                            <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis;"
                                th:text="${doc.originalText}">
                            </td>

                            <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis;"
                                th:text="${doc.simplifiedText}">
                            </td>
                        </tr>
                    </tbody>
                </table>

            </div>-->

        </div>

    </div>
</div>

</body>
</html>
