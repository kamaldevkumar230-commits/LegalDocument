<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - LegalAI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        /* SIDEBAR */
        .sidebar {
            height: 100vh;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            padding: 25px;
            position: fixed;
            width: 220px;
        }

        .sidebar h3 {
            margin-bottom: 30px;
            font-weight: 600;
        }

        .sidebar a {
            display: block;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            color: #bbb;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #00c6ff;
            color: white;
        }

        /* MAIN CONTENT */
        .main {
            margin-left: 240px;
            padding: 30px;
        }

        h3 {
            font-weight: 600;
        }

        /* CARDS */
        .card-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .card-box:hover {
            transform: translateY(-5px);
        }

        .card-box h4 {
            font-size: 28px;
            color: #00c6ff;
        }

        /* TABLE */
        .table-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
        }

        table {
            color: white;
        }

        th {
            color: #00c6ff;
        }

        tr:hover {
            background: rgba(255,255,255,0.1);
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>⚙ Admin</h3>

    <a href="#">🏠 Dashboard</a>
    <a href="#">👥 Users</a>
    <a href="#">📄 Documents</a>
    <a href="/logout">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <h3>Welcome Admin 👋</h3>

    <!-- STATS -->
    <div class="row my-4">

        <div class="col-md-4">
            <div class="card-box">
                <h4 th:text="${userCount}"></h4>
                <p>Total Users</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box">
                <h4 th:text="${docCount}"></h4>
                <p>Total Documents</p>
            </div>
        </div>

    </div>

	<div class="table-box">
	    <h5>👥 All Users</h5>

	    <table class="table table-bordered text-center mt-3">
	        <thead>
	            <tr>
	                <th>ID</th>
	                <th>Name</th>
	                <th>Email</th>
	                <th>Action</th> <!-- 🔥 NEW -->
	            </tr>
	        </thead>

	        <tbody>
	            <tr th:each="u : ${users}">
	                <td th:text="${u.id}"></td>
	                <td th:text="${u.name}"></td>
	                <td th:text="${u.email}"></td>

	                <td>
	                    <a th:href="@{'/admin/delete/' + ${u.id}}"
	                       class="btn btn-danger btn-sm"
	                       onclick="return confirm('Are you sure to delete this user?')">
	                        🗑 Delete
	                    </a>
	                </td>

	            </tr>
	        </tbody>
	    </table>
	</div>
    <!-- DOCUMENTS -->
    <div class="table-box">
        <h5>📄 All Documents</h5>

        <table class="table table-bordered text-center mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Original</th>
                    <th>Simplified</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="d : ${docs}">
                    <td th:text="${d.id}"></td>
                    <td th:text="${d.originalText}"></td>
                    <td th:text="${d.simplifiedText}"></td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
