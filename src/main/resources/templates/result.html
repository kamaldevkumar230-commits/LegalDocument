<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>LegalAI Result</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding-top: 80px;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 22px;
        }

        .nav-link {
            color: #fff !important;
        }

        .nav-link:hover {
            color: #00c6ff !important;
        }

        /* MAIN CONTAINER */
        .container-box {
            max-width: 900px;
            margin: auto;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* RESULT BOX */
        .box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .box h5 {
            margin-bottom: 15px;
            color: #00c6ff;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #eee;
        }

        /* BUTTON */
        .btn-custom {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 30px;
            padding: 10px 25px;
            color: white;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,198,255,0.5);
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/">LegalAI</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item"><a class="nav-link" href="/dashboard">Back</a></li>

                <li class="nav-item" th:if="${session.user == null}">
                    <a class="nav-link" href="/login">Login</a>
                </li>

                <li class="nav-item" th:if="${session.user == null}">
                    <a class="nav-link" href="/register">Register</a>
                </li>

                <li class="nav-item" th:if="${session.user != null}">
                    <a class="nav-link" href="/logout">Logout</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- RESULT CONTENT -->
<div class="container-box">

    <h2>📄 AI Simplified Result</h2>

    <div class="box">
        <h5>📜 Original Text</h5>
        <pre th:text="${original}"></pre>
    </div>

    <div class="box">
        <h5>✨ Simplified Text</h5>
        <pre th:text="${simplified}"></pre>
    </div>

    <div class="text-center mt-4">
        <a href="/dashboard" class="btn btn-custom">⬅ Back to Dashboard</a>
    </div>

</div>

</body>
</html>
